<!doctype html>
<html lang="en" style="background: black">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>System Breach</title>

    <style>
      html,
      body {
        margin: 0;
        padding: 0;
        background: black;
        overflow: hidden;
        font-family: monospace;
        color: #00ff00;
      }

      /* MATRIX */
      canvas {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        z-index: 0;
      }

      /* TERMINAL */
      #terminal {
        position: relative;
        z-index: 1;
        white-space: pre-line;
        font-size: 14px;
        padding: 15px;
        max-height: 50vh;
        overflow: auto;
      }

      .blink {
        animation: blink 1s infinite;
      }

      @keyframes blink {
        0%,
        100% {
          opacity: 1;
        }
        50% {
          opacity: 0;
        }
      }

      /* PROGRESS */
      .progress {
        position: relative;
        z-index: 1;
        width: 90%;
        background: #111;
        border: 1px solid #00ff00;
        margin: 10px auto;
      }

      .bar {
        width: 0%;
        height: 10px;
        background: #00ff00;
      }

      /* CAMERA */
      .camera {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background: black;
        display: none;
        justify-content: center;
        align-items: center;
        font-size: 22px;
        z-index: 2;
      }

      /* FLASH */
      .flash {
        position: fixed;
        width: 100%;
        height: 100%;
        background: white;
        opacity: 0;
        z-index: 3;
      }

      /* FBI ALERT */
      .fbi {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background: red;
        color: white;
        display: none;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        text-align: center;
        font-size: 22px;
        z-index: 10;
      }

      /* FILE DELETE */
      .delete {
        margin-top: 20px;
        color: black;
        background: white;
        padding: 10px;
        height: 150px;
        overflow: auto;
        width: 80%;
      }

      /* FINAL */
      .final {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background: black;
        color: red;
        display: none;
        justify-content: center;
        align-items: center;
        text-align: center;
        font-size: 40px;
        z-index: 20;
      }
    </style>
  </head>

  <body>
    <canvas id="matrix"></canvas>

    <div id="terminal"></div>

    <div class="progress">
      <div class="bar" id="bar"></div>
    </div>

    <div class="camera" id="camera">📸 Accessing Front Camera...</div>

    <div class="flash" id="flash"></div>

    <div class="fbi" id="fbi">
      ⚠ FBI WARNING ⚠ Your device has been flagged for illegal activity.
      Uploading files...

      <div id="timer" style="font-size: 40px; margin-top: 20px"></div>

      <div class="delete" id="delete"></div>
    </div>

    <div class="final" id="final">
      ⚠ SYSTEM FULLY HACKED ⚠
      <br /><br />
      All Data Uploaded
      <br />
      Device Under Control
    </div>

    <!-- sounds -->

    <audio id="beep" src="https://www.soundjay.com/button/beep-07.mp3"></audio>

    <audio
      id="siren"
      src="https://www.soundjay.com/mechanical/sounds/siren-01.mp3"
    ></audio>

    <script>
      /* ONE TIME PAGE */

      if (localStorage.getItem("hackPage")) {
        document.body.innerHTML =
          "<h1 style='color:#00ff00;text-align:center;margin-top:40vh'>Link Expired</h1>";
      } else {
        localStorage.setItem("hackPage", "true");
      }

      /* MATRIX */

      const canvas = document.getElementById("matrix");
      const ctx = canvas.getContext("2d");

      canvas.height = window.innerHeight;
      canvas.width = window.innerWidth;

      const letters = "ABCDEFGHIJKLMNOPQRSTUVWXYZ123456789@#$%^&*()*&^%";

      const font = 16;

      const columns = canvas.width / font;

      const drops = [];

      for (let x = 0; x < columns; x++) drops[x] = 1;

      function draw() {
        ctx.fillStyle = "rgba(0,0,0,0.05)";
        ctx.fillRect(0, 0, canvas.width, canvas.height);

        ctx.fillStyle = "#0f0";
        ctx.font = font + "px monospace";

        for (let i = 0; i < drops.length; i++) {
          const text = letters[Math.floor(Math.random() * letters.length)];

          ctx.fillText(text, i * font, drops[i] * font);

          if (drops[i] * font > canvas.height && Math.random() > 0.975) {
            drops[i] = 0;
          }

          drops[i]++;
        }
      }

      setInterval(draw, 50);

      /* TERMINAL */

      const lines = [
        "Initializing breach protocol...",
        "Connecting to mobile device...",
        "IP Address: 192.168." +
          Math.floor(Math.random() * 255) +
          "." +
          Math.floor(Math.random() * 255),
        "Scanning network...",
        "Bypassing firewall...",
        "Access granted ✔",
        "Extracting contacts...",
        "Downloading gallery...",
        "Tracking GPS location...",
        "Injecting spyware...",
        "WARNING: DEVICE COMPROMISED",
      ];

      let i = 0;
      let j = 0;
      let current = "";

      function type() {
        if (i < lines.length) {
          if (j < lines[i].length) {
            current += lines[i].charAt(j);

            terminal.innerHTML = current + '<span class="blink">|</span>';

            j++;

            setTimeout(type, 25);
          } else {
            current += "\n";

            i++;
            j = 0;

            setTimeout(type, 300);
          }
        } else {
          startProgress();
        }
      }

      type();

      /* PROGRESS */

      function startProgress() {
        let width = 0;

        const bar = document.getElementById("bar");

        const interval = setInterval(() => {
          width++;

          bar.style.width = width + "%";

          if (width == 100) {
            clearInterval(interval);

            document.getElementById("beep").play();

            fakeCamera();
          }
        }, 40);
      }

      /* CAMERA */

      function fakeCamera() {
        camera.style.display = "flex";

        setTimeout(() => {
          flash.style.opacity = "1";

          setTimeout(() => {
            flash.style.opacity = "0";

            showFBI();
          }, 200);
        }, 1500);
      }

      /* FBI */

      function showFBI() {
        const fbi = document.getElementById("fbi");

        fbi.style.display = "flex";

        if (navigator.vibrate) {
          navigator.vibrate([200, 100, 200, 100, 200]);
        }

        let time = 10;

        const timer = document.getElementById("timer");

        const del = document.getElementById("delete");

        const files = [
          "Documents/project.docx",
          "Pictures/photo.jpg",
          "Downloads/passwords.txt",
          "Desktop/notes.txt",
          "Music/song.mp3",
        ];

        const countdown = setInterval(() => {
          timer.innerHTML = "System wipe in 00:0" + time;

          del.innerHTML +=
            "Deleting C:/" +
            files[Math.floor(Math.random() * files.length)] +
            "<br>";

          time--;

          if (time < 0) {
            clearInterval(countdown);

            finale();
          }
        }, 1000);
      }

      /* FINAL */

      function finale() {
        document.getElementById("siren").play();

        const final = document.getElementById("final");

        final.style.display = "flex";

        let flashes = 0;

        const flashInterval = setInterval(() => {
          document.body.style.background = flashes % 2 ? "red" : "black";

          flashes++;

          if (flashes > 20) {
            clearInterval(flashInterval);

            document.body.style.background = "black";
          }
        }, 200);
      }
    </script>
  </body>
</html>
