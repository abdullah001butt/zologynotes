<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>System Breach</title>

<style>
  body {
    background: black;
    color: #00ff00;
    font-family: monospace;
    padding: 15px;
    overflow: hidden;
  }

  #terminal {
    white-space: pre-line;
    font-size: 14px;
  }

  .blink {
    animation: blink 1s infinite;
  }

  @keyframes blink {
    0%,100% { opacity: 1; }
    50% { opacity: 0; }
  }

  .progress {
    width: 100%;
    background: #111;
    border: 1px solid #00ff00;
    margin: 10px 0;
  }

  .bar {
    width: 0%;
    height: 10px;
    background: #00ff00;
  }

  .camera {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: black;
    display: none;
    justify-content: center;
    align-items: center;
    font-size: 20px;
  }

  .flash {
    position: fixed;
    width: 100%;
    height: 100%;
    background: white;
    opacity: 0;
  }
</style>
</head>

<body>

<div id="terminal"></div>

<div class="progress"><div class="bar" id="bar"></div></div>

<div class="camera" id="camera">
  📸 Accessing Front Camera...
</div>

<div class="flash" id="flash"></div>

<script>
const lines = [
  "Initializing breach protocol...",
  "Connecting to mobile device...",
  "IP Address: 192.168.43.***",
  "Bypassing firewall...",
  "Access granted ✔",
  "Extracting contacts...",
  "Downloading gallery...",
  "Tracking live location...",
  "Injecting spyware...",
  "WARNING: DEVICE COMPROMISED",
];

let i = 0;
let j = 0;
let current = "";

function type() {
  if (i < lines.length) {
    if (j < lines[i].length) {
      current += lines[i].charAt(j);
      document.getElementById("terminal").innerHTML = current + '<span class="blink">|</span>';
      j++;
      setTimeout(type, 25);
    } else {
      current += "\n";
      i++;
      j = 0;
      setTimeout(type, 300);
    }
  } else {
    startProgress();
  }
}

type();

// Progress bar animation
function startProgress() {
  let width = 0;
  let bar = document.getElementById("bar");

  let interval = setInterval(() => {
    width++;
    bar.style.width = width + "%";

    if (width === 100) {
      clearInterval(interval);
      fakeCamera();
    }
  }, 40);
}

// Fake camera effect
function fakeCamera() {
  document.getElementById("camera").style.display = "flex";

  setTimeout(() => {
    let flash = document.getElementById("flash");
    flash.style.opacity = "1";
    setTimeout(() => {
      flash.style.opacity = "0";
      showFinal();
    }, 200);
  }, 1500);
}

// Final message + vibration
function showFinal() {
  document.body.innerHTML = `
    <h2 style="color:red; text-align:center;">
    ⚠ SYSTEM FULLY HACKED ⚠<br><br>
    Your data has been uploaded<br>
    Device under control
    </h2>
  `;

  // vibration (works on some mobiles)
  if (navigator.vibrate) {
    navigator.vibrate([200,100,200,100,300]);
  }
}
</script>

</body>
</html>
